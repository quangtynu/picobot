version: "2"

linters:
  default: none
  enable:
    - errcheck
    - staticcheck
    - ineffassign
    - unused
  settings:
    errcheck:
      exclude-functions:
        - fmt.Print
        - fmt.Println
        - fmt.Printf
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
        - (net/http.ResponseWriter).Write
        - (io.ReadCloser).Close
        - io.ReadAll
